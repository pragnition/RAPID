<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 740">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#859289" opacity="0.3"/>
    </pattern>

    <!-- Drop shadows per phase -->
    <filter id="sSetup" x="-15%" y="-15%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#859289" flood-opacity="0.06"/>
    </filter>
    <filter id="sPlan" x="-15%" y="-15%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a7c080" flood-opacity="0.06"/>
    </filter>
    <filter id="sExec" x="-15%" y="-15%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#7fbbb3" flood-opacity="0.06"/>
    </filter>

    <!-- Agent pill shadow (lighter) -->
    <filter id="sAgent" x="-10%" y="-20%" width="130%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <!-- Connector gradients -->
    <linearGradient id="connSetup" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#859289" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#859289" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="connPlan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a7c080" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a7c080" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="connExec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fbbb3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7fbbb3" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="#2d353b" width="1280" height="740" rx="8"/>
  <rect fill="url(#dotGrid)" width="1280" height="740" rx="8"/>

  <!-- Title -->
