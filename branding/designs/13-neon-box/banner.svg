<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="g13bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="neon13">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon13soft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect fill="url(#g13bg)" width="1280" height="320" rx="12"/>

  <!-- Neon border rectangle -->
  <rect x="80" y="40" width="1120" height="240" rx="8" fill="none" stroke="#06b6d4" stroke-width="1.5" filter="url(#neon13)" opacity="0.7"/>

  <!-- Corner accents -->
  <rect x="76" y="36" width="24" height="4" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>
  <rect x="76" y="36" width="4" height="24" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>
  <rect x="1180" y="36" width="24" height="4" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>
  <rect x="1200" y="36" width="4" height="24" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>
  <rect x="76" y="280" width="24" height="4" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>
  <rect x="76" y="260" width="4" height="24" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>
  <rect x="1180" y="280" width="24" height="4" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>
  <rect x="1200" y="260" width="4" height="24" rx="2" fill="#06b6d4" filter="url(#neon13soft)"/>

  <!-- RAPID text with neon glow -->
  <text fill="#06b6d4" x="640" y="190" font-family="'SF Mono','Fira Code',monospace" font-weight="bold" font-size="120" text-anchor="middle" letter-spacing="28" filter="url(#neon13)">RAPID</text>

  <!-- Tagline -->
  <text fill="#0e7490" x="640" y="240" font-family="'SF Mono','Fira Code',monospace" font-size="12" text-anchor="middle" letter-spacing="5">RAPID AGENTIC PARALLELIZABLE &amp; ISOLATABLE DEVELOPMENT</text>

  <!-- Scan line effect -->
  <rect fill="#06b6d4" x="80" y="158" width="1120" height="1" opacity="0.08"/>
</svg>
