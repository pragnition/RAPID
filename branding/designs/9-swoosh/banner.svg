<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020618"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#06b6d4"/>
      <stop offset="70%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="30%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f472b6"/>
      <stop offset="70%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#818cf8"/>
      <stop offset="70%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect fill="url(#bg9)" width="1280" height="320" rx="12"/>

  <!-- Speed swooshes - smooth curves converging right -->
  <g filter="url(#glow9)">
    <!-- Swoosh 1 - top -->
    <path d="M-40 60 Q200 50 400 80 Q550 105 620 120" stroke="url(#s2)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-40 60 Q200 50 400 80 Q550 105 620 120" stroke="url(#s2)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.15"/>

    <!-- Swoosh 2 -->
    <path d="M-20 120 Q180 100 380 120 Q520 140 640 145" stroke="url(#s1)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M-20 120 Q180 100 380 120 Q520 140 640 145" stroke="url(#s1)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.1"/>

    <!-- Swoosh 3 - center, thickest -->
    <path d="M-60 165 Q200 155 420 160 Q580 163 660 160" stroke="url(#s1)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M-60 165 Q200 155 420 160 Q580 163 660 160" stroke="url(#s1)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.08"/>

    <!-- Swoosh 4 -->
    <path d="M0 210 Q200 220 400 200 Q540 185 640 180" stroke="url(#s3)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M0 210 Q200 220 400 200 Q540 185 640 180" stroke="url(#s3)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.12"/>

    <!-- Swoosh 5 - bottom -->
    <path d="M20 270 Q220 260 400 248 Q540 235 620 230" stroke="url(#s4)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M20 270 Q220 260 400 248 Q540 235 620 230" stroke="url(#s4)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.1"/>
  </g>

  <!-- Convergence point glow -->
  <circle cx="660" cy="160" r="40" fill="#06b6d4" opacity="0.03"/>
  <circle cx="660" cy="160" r="20" fill="#06b6d4" opacity="0.05"/>
  <circle cx="660" cy="160" r="4" fill="#ffffff" opacity="0.6"/>

  <!-- Output line from convergence -->
  <path d="M664 160 Q700 160 730 160" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M730 160 Q740 160 745 160" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.15" stroke-linecap="round"/>

  <!-- RAPID text -->
  <text fill="#e2e8f0" x="780" y="138" font-family="'SF Mono', 'Fira Code', monospace" font-weight="bold" font-size="72" letter-spacing="14">RAPID</text>

  <!-- Tagline -->
  <text fill="#64748b" x="784" y="174" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" letter-spacing="3">RAPID AGENTIC PARALLELIZABLE &amp; ISOLATABLE DEVELOPMENT</text>

  <!-- Thin accent under text -->
  <line x1="784" y1="184" x2="1200" y2="184" stroke="#334155" stroke-width="0.5"/>

  <!-- Particle dots along paths -->
  <g fill="#06b6d4" opacity="0.4">
    <circle cx="300" cy="76" r="1.5"/>
    <circle cx="450" cy="130" r="1.5"/>
    <circle cx="350" cy="160" r="2"/>
    <circle cx="500" cy="195" r="1.5"/>
    <circle cx="380" cy="245" r="1.5"/>
  </g>
</svg>
