<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Pixel art lightning bolt icon - transparent background -->

  <!-- Main bolt -->
  <rect fill="#ffd700" x="136" y="16" width="40" height="8"/>
  <rect fill="#ffd700" x="120" y="24" width="40" height="8"/>
  <rect fill="#ffd700" x="104" y="32" width="40" height="8"/>
  <rect fill="#ffd700" x="88" y="40" width="40" height="8"/>
  <rect fill="#ffd700" x="72" y="48" width="40" height="8"/>
  <rect fill="#ffd700" x="56" y="56" width="40" height="8"/>

  <!-- First jag -->
  <rect fill="#ffec80" x="56" y="64" width="120" height="8"/>
  <rect fill="#ffd700" x="56" y="72" width="120" height="8"/>

  <!-- Middle bolt -->
  <rect fill="#ffd700" x="136" y="80" width="40" height="8"/>
  <rect fill="#ffd700" x="120" y="88" width="40" height="8"/>
  <rect fill="#ffd700" x="104" y="96" width="40" height="8"/>
  <rect fill="#ffd700" x="88" y="104" width="40" height="8"/>
  <rect fill="#ffd700" x="72" y="112" width="40" height="8"/>

  <!-- Second jag -->
  <rect fill="#ffec80" x="72" y="120" width="96" height="8"/>
  <rect fill="#ffd700" x="72" y="128" width="96" height="8"/>

  <!-- Lower strike -->
  <rect fill="#ffd700" x="128" y="136" width="40" height="8"/>
  <rect fill="#ffd700" x="112" y="144" width="40" height="8"/>
  <rect fill="#ffd700" x="96" y="152" width="40" height="8"/>
  <rect fill="#ffd700" x="80" y="160" width="40" height="8"/>
  <rect fill="#ffd700" x="64" y="168" width="40" height="8"/>
  <rect fill="#ffd700" x="48" y="176" width="40" height="8"/>

  <!-- Ground strike glow -->
  <rect fill="#ffec80" x="40" y="184" width="32" height="8"/>
  <rect fill="#fff4b3" x="48" y="192" width="16" height="8"/>
  <rect fill="#ffffff" x="52" y="200" width="8" height="8"/>

  <!-- Spark pixels -->
  <rect fill="#ffffff" x="176" y="8" width="8" height="8"/>
  <rect fill="#ffffff" x="184" y="16" width="8" height="8"/>
  <rect fill="#ffec80" x="192" y="8" width="8" height="8"/>
  <rect fill="#ffffff" x="32" y="192" width="8" height="8"/>
  <rect fill="#ffec80" x="24" y="200" width="8" height="8"/>

  <!-- Glow -->
  <rect fill="#ffd700" opacity="0.3" x="48" y="48" width="8" height="8"/>
  <rect fill="#ffd700" opacity="0.3" x="104" y="48" width="8" height="8"/>
  <rect fill="#ffd700" opacity="0.3" x="40" y="168" width="8" height="8"/>
  <rect fill="#ffd700" opacity="0.3" x="112" y="168" width="8" height="8"/>
  <rect fill="#ffd700" opacity="0.2" x="184" y="72" width="8" height="8"/>
  <rect fill="#ffd700" opacity="0.2" x="176" y="128" width="8" height="8"/>

  <!-- R letter watermark -->
  <g fill="#ffd700" opacity="0.12">
    <rect x="176" y="176" width="8" height="48"/>
    <rect x="184" y="176" width="24" height="8"/>
    <rect x="208" y="184" width="8" height="12"/>
    <rect x="184" y="196" width="24" height="8"/>
    <rect x="200" y="204" width="8" height="8"/>
    <rect x="208" y="212" width="8" height="12"/>
  </g>
</svg>
