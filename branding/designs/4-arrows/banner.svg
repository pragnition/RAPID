<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <rect fill="#0d1117" width="1280" height="320" rx="12"/>

  <!-- Converging pixel arrows representing parallel execution -->

  <!-- Arrow 1 (top) - cyan -->
  <g fill="#00d4aa">
    <rect x="40" y="40" width="120" height="8"/>
    <rect x="40" y="48" width="120" height="8"/>
    <rect x="160" y="32" width="8" height="8"/>
    <rect x="168" y="40" width="8" height="8"/>
    <rect x="176" y="48" width="8" height="8"/>
    <rect x="160" y="56" width="8" height="8"/>
    <rect x="168" y="48" width="8" height="8"/>
    <!-- Trail -->
    <rect x="40" y="40" width="8" height="16" opacity="0.3"/>
    <rect x="56" y="40" width="8" height="16" opacity="0.4"/>
    <rect x="72" y="40" width="8" height="16" opacity="0.5"/>
    <rect x="88" y="40" width="8" height="16" opacity="0.6"/>
    <rect x="104" y="40" width="8" height="16" opacity="0.7"/>
    <rect x="120" y="40" width="8" height="16" opacity="0.8"/>
    <rect x="136" y="40" width="8" height="16" opacity="0.9"/>
  </g>

  <!-- Arrow 2 - blue -->
  <g fill="#3b82f6">
    <rect x="80" y="96" width="160" height="8"/>
    <rect x="80" y="104" width="160" height="8"/>
    <rect x="240" y="88" width="8" height="8"/>
    <rect x="248" y="96" width="8" height="8"/>
    <rect x="256" y="104" width="8" height="8"/>
    <rect x="240" y="112" width="8" height="8"/>
    <rect x="248" y="104" width="8" height="8"/>
    <rect x="80" y="96" width="8" height="16" opacity="0.3"/>
    <rect x="96" y="96" width="8" height="16" opacity="0.4"/>
    <rect x="112" y="96" width="8" height="16" opacity="0.5"/>
    <rect x="128" y="96" width="8" height="16" opacity="0.6"/>
    <rect x="144" y="96" width="8" height="16" opacity="0.7"/>
    <rect x="160" y="96" width="8" height="16" opacity="0.8"/>
  </g>

  <!-- Arrow 3 (center) - bright white/cyan, longest -->
  <g fill="#e0f2fe">
    <rect x="40" y="152" width="280" height="8"/>
    <rect x="40" y="160" width="280" height="8"/>
    <rect x="320" y="144" width="8" height="8"/>
    <rect x="328" y="152" width="8" height="8"/>
    <rect x="336" y="160" width="8" height="8"/>
    <rect x="320" y="168" width="8" height="8"/>
    <rect x="328" y="160" width="8" height="8"/>
    <rect x="40" y="152" width="8" height="16" opacity="0.2"/>
    <rect x="64" y="152" width="8" height="16" opacity="0.3"/>
    <rect x="88" y="152" width="8" height="16" opacity="0.4"/>
    <rect x="112" y="152" width="8" height="16" opacity="0.5"/>
    <rect x="136" y="152" width="8" height="16" opacity="0.6"/>
    <rect x="160" y="152" width="8" height="16" opacity="0.7"/>
  </g>

  <!-- Arrow 4 - purple -->
  <g fill="#a855f7">
    <rect x="100" y="208" width="140" height="8"/>
    <rect x="100" y="216" width="140" height="8"/>
    <rect x="240" y="200" width="8" height="8"/>
    <rect x="248" y="208" width="8" height="8"/>
    <rect x="256" y="216" width="8" height="8"/>
    <rect x="240" y="224" width="8" height="8"/>
    <rect x="248" y="216" width="8" height="8"/>
    <rect x="100" y="208" width="8" height="16" opacity="0.3"/>
    <rect x="116" y="208" width="8" height="16" opacity="0.4"/>
    <rect x="132" y="208" width="8" height="16" opacity="0.5"/>
    <rect x="148" y="208" width="8" height="16" opacity="0.6"/>
    <rect x="164" y="208" width="8" height="16" opacity="0.7"/>
  </g>

  <!-- Arrow 5 (bottom) - pink -->
  <g fill="#f472b6">
    <rect x="60" y="264" width="100" height="8"/>
    <rect x="60" y="272" width="100" height="8"/>
    <rect x="160" y="256" width="8" height="8"/>
    <rect x="168" y="264" width="8" height="8"/>
    <rect x="176" y="272" width="8" height="8"/>
    <rect x="160" y="280" width="8" height="8"/>
    <rect x="168" y="272" width="8" height="8"/>
    <rect x="60" y="264" width="8" height="16" opacity="0.3"/>
    <rect x="76" y="264" width="8" height="16" opacity="0.4"/>
    <rect x="92" y="264" width="8" height="16" opacity="0.5"/>
    <rect x="108" y="264" width="8" height="16" opacity="0.6"/>
  </g>

  <!-- Merge point / convergence indicator -->
  <g fill="#ffffff" opacity="0.08">
    <rect x="380" y="40" width="8" height="256"/>
    <rect x="400" y="60" width="8" height="216"/>
    <rect x="420" y="80" width="8" height="176"/>
    <rect x="440" y="100" width="8" height="136"/>
    <rect x="460" y="120" width="8" height="96"/>
    <rect x="480" y="140" width="8" height="56"/>
  </g>

  <!-- Merge node -->
  <rect fill="#ffffff" x="500" y="152" width="16" height="16" rx="2"/>
  <rect fill="#e0f2fe" x="504" y="156" width="8" height="8"/>

  <!-- Output arrow from merge -->
  <g fill="#ffffff" opacity="0.5">
    <rect x="528" y="156" width="8" height="8"/>
    <rect x="540" y="156" width="8" height="8"/>
    <rect x="552" y="156" width="8" height="8"/>
    <rect x="564" y="156" width="8" height="8"/>
  </g>

  <!-- RAPID text -->
  <text fill="#e0f2fe" x="640" y="132" font-family="monospace" font-weight="bold" font-size="80" letter-spacing="14">RAPID</text>

  <!-- Tagline -->
  <text fill="#64748b" x="644" y="176" font-family="monospace" font-size="13" letter-spacing="3">RAPID AGENTIC PARALLELIZABLE &amp; ISOLATABLE DEVELOPMENT</text>

  <!-- Colored dots matching arrows -->
  <g>
    <rect fill="#00d4aa" x="644" y="200" width="8" height="8" rx="4"/>
    <text fill="#94a3b8" x="660" y="208" font-family="monospace" font-size="10">PARALLEL</text>
    <rect fill="#3b82f6" x="760" y="200" width="8" height="8" rx="4"/>
    <text fill="#94a3b8" x="776" y="208" font-family="monospace" font-size="10">ISOLATED</text>
    <rect fill="#a855f7" x="872" y="200" width="8" height="8" rx="4"/>
    <text fill="#94a3b8" x="888" y="208" font-family="monospace" font-size="10">AGENTIC</text>
    <rect fill="#f472b6" x="976" y="200" width="8" height="8" rx="4"/>
    <text fill="#94a3b8" x="992" y="208" font-family="monospace" font-size="10">MERGED</text>
  </g>
</svg>
