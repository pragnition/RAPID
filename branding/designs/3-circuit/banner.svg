<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <rect fill="#0a1628" width="1280" height="320" rx="12"/>

  <!-- Circuit traces -->
  <g fill="none" stroke="#0e4d6e" stroke-width="2">
    <!-- Horizontal lines -->
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="160" x2="160" y2="160"/>
    <line x1="0" y1="240" x2="240" y2="240"/>
    <line x1="280" y1="48" x2="500" y2="48"/>
    <line x1="320" y1="120" x2="480" y2="120"/>
    <line x1="240" y1="200" x2="440" y2="200"/>
    <line x1="360" y1="272" x2="560" y2="272"/>

    <!-- Vertical lines -->
    <line x1="200" y1="80" x2="200" y2="160"/>
    <line x1="160" y1="160" x2="160" y2="240"/>
    <line x1="320" y1="48" x2="320" y2="120"/>
    <line x1="440" y1="120" x2="440" y2="200"/>
    <line x1="500" y1="48" x2="500" y2="120"/>
    <line x1="240" y1="200" x2="240" y2="240"/>

    <!-- Right side traces -->
    <line x1="780" y1="48" x2="1280" y2="48"/>
    <line x1="820" y1="120" x2="1280" y2="120"/>
    <line x1="780" y1="200" x2="1280" y2="200"/>
    <line x1="820" y1="272" x2="1280" y2="272"/>
    <line x1="900" y1="48" x2="900" y2="120"/>
    <line x1="1000" y1="120" x2="1000" y2="200"/>
    <line x1="1100" y1="48" x2="1100" y2="120"/>
    <line x1="1200" y1="200" x2="1200" y2="272"/>
  </g>

  <!-- Circuit nodes (pixel squares) -->
  <g fill="#1a8aaa">
    <rect x="196" y="76" width="8" height="8"/>
    <rect x="156" y="156" width="8" height="8"/>
    <rect x="236" y="196" width="8" height="8"/>
    <rect x="316" y="44" width="8" height="8"/>
    <rect x="436" y="116" width="8" height="8"/>
    <rect x="496" y="44" width="8" height="8"/>
    <rect x="236" y="236" width="8" height="8"/>
    <rect x="556" y="268" width="8" height="8"/>
  </g>

  <!-- Active/glowing nodes -->
  <g fill="#00e5ff">
    <rect x="196" y="156" width="8" height="8"/>
    <rect x="316" y="116" width="8" height="8"/>
    <rect x="440" y="196" width="8" height="8"/>
    <rect x="500" y="116" width="8" height="8"/>
    <rect x="896" y="44" width="8" height="8"/>
    <rect x="996" y="116" width="8" height="8"/>
    <rect x="1096" y="44" width="8" height="8"/>
    <rect x="1196" y="196" width="8" height="8"/>
    <rect x="1196" y="268" width="8" height="8"/>
  </g>

  <!-- Glowing traces (active paths) -->
  <g fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.6">
    <line x1="200" y1="80" x2="200" y2="160"/>
    <line x1="316" y1="120" x2="440" y2="120"/>
    <line x1="440" y1="120" x2="440" y2="200"/>
    <line x1="500" y1="48" x2="500" y2="120"/>
    <line x1="900" y1="48" x2="900" y2="120"/>
    <line x1="1000" y1="120" x2="1000" y2="200"/>
    <line x1="1200" y1="200" x2="1200" y2="272"/>
  </g>

  <!-- Central CPU/chip pixel block -->
  <g transform="translate(540, 80)">
    <!-- Chip body -->
    <rect fill="#0d3048" x="0" y="0" width="160" height="160" rx="4"/>
    <rect fill="#0a2438" x="8" y="8" width="144" height="144" rx="2"/>

    <!-- Chip pins top -->
    <rect fill="#1a8aaa" x="24" y="-8" width="8" height="12"/>
    <rect fill="#1a8aaa" x="48" y="-8" width="8" height="12"/>
    <rect fill="#1a8aaa" x="72" y="-8" width="8" height="12"/>
    <rect fill="#1a8aaa" x="96" y="-8" width="8" height="12"/>
    <rect fill="#1a8aaa" x="120" y="-8" width="8" height="12"/>

    <!-- Chip pins bottom -->
    <rect fill="#1a8aaa" x="24" y="156" width="8" height="12"/>
    <rect fill="#1a8aaa" x="48" y="156" width="8" height="12"/>
    <rect fill="#1a8aaa" x="72" y="156" width="8" height="12"/>
    <rect fill="#1a8aaa" x="96" y="156" width="8" height="12"/>
    <rect fill="#1a8aaa" x="120" y="156" width="8" height="12"/>

    <!-- Chip pins left -->
    <rect fill="#1a8aaa" x="-8" y="24" width="12" height="8"/>
    <rect fill="#1a8aaa" x="-8" y="48" width="12" height="8"/>
    <rect fill="#1a8aaa" x="-8" y="72" width="12" height="8"/>
    <rect fill="#1a8aaa" x="-8" y="96" width="12" height="8"/>
    <rect fill="#1a8aaa" x="-8" y="120" width="12" height="8"/>

    <!-- Chip pins right -->
    <rect fill="#1a8aaa" x="156" y="24" width="12" height="8"/>
    <rect fill="#1a8aaa" x="156" y="48" width="12" height="8"/>
    <rect fill="#1a8aaa" x="156" y="72" width="12" height="8"/>
    <rect fill="#1a8aaa" x="156" y="96" width="12" height="8"/>
    <rect fill="#1a8aaa" x="156" y="120" width="12" height="8"/>

    <!-- Inner circuit pattern -->
    <rect fill="#00e5ff" opacity="0.15" x="24" y="24" width="112" height="112"/>

    <!-- R pixel art inside chip -->
    <g fill="#00e5ff">
      <rect x="40" y="40" width="8" height="64"/>
      <rect x="48" y="40" width="32" height="8"/>
      <rect x="80" y="48" width="8" height="20"/>
      <rect x="48" y="68" width="32" height="8"/>
      <rect x="72" y="76" width="8" height="8"/>
      <rect x="80" y="84" width="8" height="20"/>
    </g>
  </g>

  <!-- RAPID text -->
  <text fill="#00e5ff" x="820" y="140" font-family="monospace" font-weight="bold" font-size="64" letter-spacing="12">RAPID</text>

  <!-- Tagline -->
  <text fill="#1a8aaa" x="824" y="176" font-family="monospace" font-size="13" letter-spacing="3">RAPID AGENTIC PARALLELIZABLE</text>
  <text fill="#1a8aaa" x="824" y="194" font-family="monospace" font-size="13" letter-spacing="3">&amp; ISOLATABLE DEVELOPMENT</text>

  <!-- Data flow dots -->
  <g fill="#00e5ff" opacity="0.5">
    <rect x="480" y="118" width="4" height="4"/>
    <rect x="488" y="118" width="4" height="4"/>
    <rect x="496" y="118" width="4" height="4"/>
    <rect x="504" y="118" width="4" height="4"/>
    <rect x="512" y="118" width="4" height="4"/>
    <rect x="520" y="118" width="4" height="4"/>

    <rect x="720" y="158" width="4" height="4"/>
    <rect x="728" y="158" width="4" height="4"/>
    <rect x="736" y="158" width="4" height="4"/>
    <rect x="744" y="158" width="4" height="4"/>
    <rect x="752" y="158" width="4" height="4"/>
    <rect x="760" y="158" width="4" height="4"/>
    <rect x="768" y="158" width="4" height="4"/>
  </g>
</svg>
