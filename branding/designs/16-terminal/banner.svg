    <text fill="#737373" x="72" y="152">-------------------------------------------</text>

    <text fill="#06b6d4" x="72" y="176">SET-A</text>
    <text fill="#22c55e" x="160" y="176">████████████████████</text>
    <text fill="#22c55e" x="410" y="176">done</text>

    <text fill="#8b5cf6" x="72" y="200">SET-B</text>
    <text fill="#8b5cf6" x="160" y="200">███████████████</text>
    <text fill="#eab308" x="340" y="200">executing w3/4</text>

    <text fill="#10b981" x="72" y="224">SET-C</text>
