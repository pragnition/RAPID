<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <rect fill="#0a0a0a" width="1280" height="320" rx="12"/>

  <!-- Terminal window chrome -->
  <rect fill="#1a1a1a" x="40" y="24" width="1200" height="272" rx="10"/>
  <rect fill="#262626" x="40" y="24" width="1200" height="36" rx="10"/>
  <rect fill="#262626" x="40" y="50" width="1200" height="10"/>

  <!-- Window buttons -->
