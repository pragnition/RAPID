  <!-- RAPID branding on right side -->
  <text fill="#ffffff" x="1000" y="170" font-family="'SF Mono','Fira Code',monospace" font-weight="900" font-size="80" text-anchor="middle" letter-spacing="10" opacity="0.06">RAPID</text>
