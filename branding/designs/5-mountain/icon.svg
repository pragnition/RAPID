<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Pixel art mountain with flag - transparent background -->

  <!-- Stars -->
  <g fill="#ffffff">
    <rect x="32" y="16" width="3" height="3" opacity="0.5"/>
    <rect x="80" y="8" width="3" height="3" opacity="0.4"/>
    <rect x="176" y="20" width="3" height="3" opacity="0.6"/>
    <rect x="224" y="12" width="3" height="3" opacity="0.3"/>
    <rect x="56" y="40" width="2" height="2" opacity="0.4"/>
    <rect x="200" y="36" width="2" height="2" opacity="0.5"/>
  </g>

  <!-- Background range -->
  <g fill="#141432">
    <rect x="0" y="168" width="256" height="88"/>
    <rect x="160" y="160" width="96" height="8"/>
    <rect x="176" y="152" width="64" height="8"/>
    <rect x="192" y="144" width="32" height="8"/>
    <rect x="200" y="136" width="16" height="8"/>
    <rect x="204" y="128" width="8" height="8"/>
  </g>

  <!-- Main mountain -->
  <g fill="#1a1a3e">
    <rect x="24" y="176" width="208" height="80"/>
    <rect x="48" y="168" width="160" height="8"/>
    <rect x="64" y="160" width="128" height="8"/>
    <rect x="72" y="152" width="112" height="8"/>
    <rect x="80" y="144" width="96" height="8"/>
    <rect x="88" y="136" width="80" height="8"/>
    <rect x="96" y="128" width="64" height="8"/>
    <rect x="104" y="120" width="48" height="8"/>
    <rect x="112" y="112" width="32" height="8"/>
    <rect x="120" y="104" width="16" height="8"/>
    <rect x="124" y="96" width="8" height="8"/>
  </g>

  <!-- Snow cap -->
  <g fill="#c8d6e5">
    <rect x="120" y="104" width="16" height="8"/>
    <rect x="124" y="96" width="8" height="8"/>
    <rect x="112" y="112" width="32" height="8"/>
    <rect x="108" y="120" width="12" height="8"/>
    <rect x="144" y="120" width="8" height="8"/>
  </g>
  <g fill="#ffffff">
    <rect x="124" y="96" width="8" height="8"/>
    <rect x="120" y="104" width="16" height="4"/>
  </g>

  <!-- Snow accents -->
  <g fill="#c8d6e5" opacity="0.5">
    <rect x="96" y="136" width="8" height="8"/>
    <rect x="168" y="136" width="8" height="8"/>
    <rect x="80" y="152" width="8" height="8"/>
    <rect x="176" y="144" width="8" height="8"/>
  </g>

  <!-- Flag -->
  <rect fill="#ff6b6b" x="124" y="80" width="16" height="8"/>
  <rect fill="#ff6b6b" x="124" y="88" width="8" height="8"/>
  <rect fill="#c8d6e5" x="120" y="80" width="4" height="20"/>

  <!-- Foreground -->
  <rect fill="#12122a" x="0" y="216" width="256" height="40"/>
  <rect fill="#12122a" x="16" y="208" width="224" height="8"/>

  <!-- Ground texture -->
  <g fill="#1a1a3e" opacity="0.4">
    <rect x="32" y="224" width="16" height="8"/>
    <rect x="96" y="232" width="24" height="8"/>
    <rect x="176" y="224" width="16" height="8"/>
  </g>
</svg>
