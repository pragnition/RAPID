<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow11a" cx="0.3" cy="0.4">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow11b" cx="0.6" cy="0.7">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect fill="url(#bg11)" width="1280" height="320" rx="12"/>

  <!-- Ambient glow -->
  <rect fill="url(#glow11a)" x="0" y="0" width="700" height="320"/>
  <rect fill="url(#glow11b)" x="200" y="0" width="600" height="320"/>

  <!-- Network mesh - nodes and connections -->
  <!-- Layer 1: background connections -->
  <g stroke="#1e293b" stroke-width="0.5" fill="none">
    <!-- Horizontal-ish connections -->
    <line x1="80" y1="60" x2="200" y2="80"/>
    <line x1="200" y1="80" x2="340" y2="55"/>
    <line x1="340" y1="55" x2="460" y2="90"/>
    <line x1="460" y1="90" x2="560" y2="65"/>
    <line x1="80" y1="160" x2="200" y2="140"/>
    <line x1="200" y1="140" x2="320" y2="170"/>
    <line x1="320" y1="170" x2="440" y2="145"/>
    <line x1="440" y1="145" x2="560" y2="175"/>
    <line x1="100" y1="260" x2="220" y2="240"/>
    <line x1="220" y1="240" x2="360" y2="265"/>
    <line x1="360" y1="265" x2="480" y2="240"/>
    <line x1="480" y1="240" x2="580" y2="260"/>
    <!-- Vertical-ish connections -->
    <line x1="80" y1="60" x2="80" y2="160"/>
    <line x1="200" y1="80" x2="200" y2="140"/>
    <line x1="200" y1="140" x2="220" y2="240"/>
    <line x1="340" y1="55" x2="320" y2="170"/>
    <line x1="460" y1="90" x2="440" y2="145"/>
    <line x1="440" y1="145" x2="480" y2="240"/>
    <line x1="560" y1="65" x2="560" y2="175"/>
    <line x1="560" y1="175" x2="580" y2="260"/>
    <line x1="80" y1="160" x2="100" y2="260"/>
    <line x1="320" y1="170" x2="360" y2="265"/>
    <!-- Diagonal crosses -->
    <line x1="80" y1="60" x2="200" y2="140"/>
    <line x1="200" y1="80" x2="80" y2="160"/>
    <line x1="200" y1="80" x2="320" y2="170"/>
    <line x1="340" y1="55" x2="440" y2="145"/>
    <line x1="460" y1="90" x2="320" y2="170"/>
    <line x1="200" y1="140" x2="360" y2="265"/>
    <line x1="320" y1="170" x2="480" y2="240"/>
    <line x1="440" y1="145" x2="580" y2="260"/>
  </g>

  <!-- Layer 2: active/highlighted connections -->
  <g stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.4">
    <line x1="200" y1="80" x2="320" y2="170"/>
    <line x1="320" y1="170" x2="440" y2="145"/>
    <line x1="440" y1="145" x2="560" y2="175"/>
    <line x1="200" y1="140" x2="320" y2="170"/>
    <line x1="320" y1="170" x2="360" y2="265"/>
  </g>

  <!-- Layer 3: bright active path -->
  <g stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="200" y1="80" x2="340" y2="55"/>
    <line x1="340" y1="55" x2="460" y2="90"/>
    <line x1="460" y1="90" x2="440" y2="145"/>
  </g>

  <!-- Nodes - background -->
  <g fill="#1e293b">
    <circle cx="80" cy="60" r="4"/>
    <circle cx="80" cy="160" r="4"/>
    <circle cx="100" cy="260" r="4"/>
    <circle cx="560" cy="65" r="4"/>
    <circle cx="560" cy="175" r="4"/>
    <circle cx="580" cy="260" r="4"/>
    <circle cx="220" cy="240" r="4"/>
    <circle cx="360" cy="265" r="4"/>
    <circle cx="480" cy="240" r="4"/>
  </g>

  <!-- Nodes - active -->
  <g>
    <circle cx="200" cy="80" r="5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="200" cy="80" r="10" fill="#06b6d4" opacity="0.1"/>
    <circle cx="340" cy="55" r="5" fill="#06b6d4" opacity="0.9"/>
    <circle cx="340" cy="55" r="10" fill="#06b6d4" opacity="0.1"/>
    <circle cx="460" cy="90" r="5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="460" cy="90" r="10" fill="#06b6d4" opacity="0.1"/>
    <circle cx="320" cy="170" r="6" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="320" cy="170" r="14" fill="#8b5cf6" opacity="0.08"/>
    <circle cx="440" cy="145" r="5" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="440" cy="145" r="10" fill="#8b5cf6" opacity="0.08"/>
    <circle cx="200" cy="140" r="4" fill="#06b6d4" opacity="0.5"/>
  </g>

  <!-- Central hub node -->
  <circle cx="320" cy="170" r="3" fill="#ffffff" opacity="0.8"/>

  <!-- Data flow particles along active path -->
  <g fill="#06b6d4">
    <circle cx="260" cy="68" r="1.5" opacity="0.6"/>
    <circle cx="390" cy="70" r="1.5" opacity="0.5"/>
    <circle cx="452" cy="112" r="1.5" opacity="0.4"/>
  </g>

  <!-- RAPID text -->
  <text fill="#e2e8f0" x="680" y="120" font-family="'SF Mono', 'Fira Code', monospace" font-weight="bold" font-size="72" letter-spacing="14">RAPID</text>

  <!-- Tagline -->
  <text fill="#475569" x="684" y="158" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" letter-spacing="3">RAPID AGENTIC PARALLELIZABLE &amp; ISOLATABLE DEVELOPMENT</text>

  <!-- Separator -->
  <line x1="684" y1="168" x2="1180" y2="168" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="10">
    <rect x="684" y="184" width="90" height="22" rx="11" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
    <text fill="#06b6d4" x="700" y="199" opacity="0.8">PARALLEL</text>

    <rect x="788" y="184" width="86" height="22" rx="11" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="0.5" stroke-opacity="0.3"/>
    <text fill="#8b5cf6" x="802" y="199" opacity="0.8">AGENTIC</text>

    <rect x="888" y="184" width="90" height="22" rx="11" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.3"/>
    <text fill="#10b981" x="900" y="199" opacity="0.8">ISOLATED</text>

    <rect x="992" y="184" width="72" height="22" rx="11" fill="#f472b6" opacity="0.1" stroke="#f472b6" stroke-width="0.5" stroke-opacity="0.3"/>
    <text fill="#f472b6" x="1006" y="199" opacity="0.8">MERGE</text>
  </g>
</svg>
