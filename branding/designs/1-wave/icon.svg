<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Pixel art Japanese wave icon - transparent background -->

  <!-- Deep water base -->
  <rect fill="#0d2b45" x="16" y="176" width="224" height="64"/>
  <rect fill="#0d2b45" x="32" y="168" width="192" height="8"/>
  <rect fill="#0d2b45" x="48" y="160" width="168" height="8"/>

  <!-- Mid water body -->
  <rect fill="#1a4a6e" x="56" y="152" width="152" height="8"/>
  <rect fill="#1a4a6e" x="64" y="144" width="136" height="8"/>
  <rect fill="#1a4a6e" x="72" y="136" width="120" height="8"/>
  <rect fill="#1a4a6e" x="24" y="176" width="208" height="8"/>

  <!-- Rising wall -->
  <rect fill="#2878a8" x="80" y="128" width="104" height="8"/>
  <rect fill="#2878a8" x="88" y="120" width="88" height="8"/>
  <rect fill="#2878a8" x="96" y="112" width="72" height="8"/>
  <rect fill="#2878a8" x="104" y="104" width="56" height="8"/>
  <rect fill="#2878a8" x="112" y="96" width="48" height="8"/>

  <!-- Crest -->
  <rect fill="#3ca4d8" x="120" y="88" width="40" height="8"/>
  <rect fill="#3ca4d8" x="128" y="80" width="40" height="8"/>
  <rect fill="#3ca4d8" x="136" y="72" width="40" height="8"/>
  <rect fill="#3ca4d8" x="148" y="64" width="32" height="8"/>

  <!-- Curl tip -->
  <rect fill="#6ecff6" x="164" y="56" width="32" height="8"/>
  <rect fill="#6ecff6" x="176" y="64" width="24" height="8"/>
  <rect fill="#6ecff6" x="184" y="72" width="16" height="8"/>
  <rect fill="#6ecff6" x="192" y="80" width="16" height="8"/>
  <rect fill="#6ecff6" x="192" y="88" width="16" height="8"/>
  <rect fill="#6ecff6" x="192" y="96" width="8" height="16"/>

  <!-- Foam -->
  <rect fill="#e8f4fd" x="128" y="72" width="8" height="8"/>
  <rect fill="#e8f4fd" x="140" y="64" width="8" height="8"/>
  <rect fill="#e8f4fd" x="148" y="56" width="16" height="8"/>
  <rect fill="#e8f4fd" x="164" y="48" width="24" height="8"/>
  <rect fill="#e8f4fd" x="188" y="48" width="16" height="8"/>
  <rect fill="#e8f4fd" x="192" y="56" width="16" height="8"/>
  <rect fill="#e8f4fd" x="200" y="64" width="8" height="8"/>
  <rect fill="#e8f4fd" x="200" y="72" width="8" height="8"/>
  <rect fill="#e8f4fd" x="208" y="80" width="8" height="16"/>

  <!-- Spray -->
  <rect fill="#ffffff" x="156" y="48" width="8" height="8"/>
  <rect fill="#ffffff" x="172" y="40" width="8" height="8"/>
  <rect fill="#ffffff" x="188" y="40" width="8" height="8"/>
  <rect fill="#ffffff" x="164" y="40" width="8" height="8"/>
  <rect fill="#ffffff" x="180" y="32" width="8" height="8"/>
  <rect fill="#ffffff" x="196" y="44" width="8" height="8"/>
  <rect fill="#ffffff" x="208" y="64" width="8" height="8"/>

  <!-- Small wave left -->
  <rect fill="#1a4a6e" x="16" y="152" width="24" height="8"/>
  <rect fill="#2878a8" x="16" y="144" width="16" height="8"/>
  <rect fill="#3ca4d8" x="16" y="136" width="16" height="8"/>
  <rect fill="#e8f4fd" x="16" y="128" width="8" height="8"/>

  <!-- Surface ripples -->
  <rect fill="#3ca4d8" x="40" y="184" width="24" height="8"/>
  <rect fill="#3ca4d8" x="120" y="192" width="16" height="8"/>
  <rect fill="#3ca4d8" x="192" y="184" width="24" height="8"/>
  <rect fill="#1a4a6e" x="64" y="200" width="16" height="8"/>
  <rect fill="#1a4a6e" x="152" y="208" width="24" height="8"/>
  <rect fill="#2878a8" x="96" y="208" width="16" height="8"/>
</svg>
