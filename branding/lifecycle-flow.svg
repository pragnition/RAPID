<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 260">
  <rect fill="#2d353b" width="1280" height="260" rx="8"/>

  <!-- Title -->
  <text x="640" y="36" text-anchor="middle" fill="#d3c6aa" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold">RAPID Lifecycle</text>

  <!-- Node 1: init (Setup) -->
  <rect fill="#859289" x="40" y="60" width="155" height="60" rx="8"/>
  <text x="117" y="86" text-anchor="middle" fill="#d3c6aa" font-family="'Courier New', 'Liberation Mono', monospace" font-size="21">init</text>
  <text x="117" y="107" text-anchor="middle" fill="#d3c6aa" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="14" opacity="0.75">Research &amp; Plan</text>

  <!-- Arrow 1-2 -->
  <line x1="195" y1="90" x2="204" y2="90" stroke="#d3c6aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="204,84 214,90 204,96" fill="#d3c6aa" opacity="0.5"/>

  <!-- Node 2: start-set (Setup) -->
  <rect fill="#859289" x="214" y="60" width="155" height="60" rx="8"/>
  <text x="291" y="86" text-anchor="middle" fill="#d3c6aa" font-family="'Courier New', 'Liberation Mono', monospace" font-size="21">start-set</text>
  <text x="291" y="107" text-anchor="middle" fill="#d3c6aa" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="14" opacity="0.75">Create Worktree</text>

  <!-- Arrow 2-3 -->
  <line x1="369" y1="90" x2="378" y2="90" stroke="#d3c6aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="378,84 388,90 378,96" fill="#d3c6aa" opacity="0.5"/>

  <!-- Node 3: discuss (Planning) -->
  <rect fill="#a7c080" x="388" y="60" width="155" height="60" rx="8"/>
  <text x="465" y="86" text-anchor="middle" fill="#2d353b" font-family="'Courier New', 'Liberation Mono', monospace" font-size="21">discuss</text>
  <text x="465" y="107" text-anchor="middle" fill="#2d353b" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="14" opacity="0.75">Capture Vision</text>

  <!-- Arrow 3-4 -->
  <line x1="543" y1="90" x2="552" y2="90" stroke="#d3c6aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="552,84 562,90 552,96" fill="#d3c6aa" opacity="0.5"/>

  <!-- Node 4: plan (Planning) -->
  <rect fill="#a7c080" x="562" y="60" width="155" height="60" rx="8"/>
  <text x="639" y="86" text-anchor="middle" fill="#2d353b" font-family="'Courier New', 'Liberation Mono', monospace" font-size="21">plan</text>
  <text x="639" y="107" text-anchor="middle" fill="#2d353b" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="14" opacity="0.75">Write Tasks</text>

  <!-- Arrow 4-5 -->
  <line x1="717" y1="90" x2="726" y2="90" stroke="#d3c6aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="726,84 736,90 726,96" fill="#d3c6aa" opacity="0.5"/>

  <!-- Node 5: execute (Execution) -->
  <rect fill="#7fbbb3" x="736" y="60" width="155" height="60" rx="8"/>
  <text x="813" y="86" text-anchor="middle" fill="#2d353b" font-family="'Courier New', 'Liberation Mono', monospace" font-size="21">execute</text>
  <text x="813" y="107" text-anchor="middle" fill="#2d353b" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="14" opacity="0.75">Implement</text>

  <!-- Arrow 5-6 -->
  <line x1="891" y1="90" x2="900" y2="90" stroke="#d3c6aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="900,84 910,90 900,96" fill="#d3c6aa" opacity="0.5"/>

  <!-- Node 6: review (Execution) -->
  <rect fill="#7fbbb3" x="910" y="60" width="155" height="60" rx="8"/>
  <text x="987" y="86" text-anchor="middle" fill="#2d353b" font-family="'Courier New', 'Liberation Mono', monospace" font-size="21">review</text>
  <text x="987" y="107" text-anchor="middle" fill="#2d353b" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="14" opacity="0.75">Verify Quality</text>

  <!-- Arrow 6-7 -->
  <line x1="1065" y1="90" x2="1074" y2="90" stroke="#d3c6aa" stroke-width="1.5" opacity="0.5"/>
  <polygon points="1074,84 1084,90 1074,96" fill="#d3c6aa" opacity="0.5"/>

  <!-- Node 7: merge (Execution) -->
  <rect fill="#7fbbb3" x="1084" y="60" width="155" height="60" rx="8"/>
  <text x="1161" y="86" text-anchor="middle" fill="#2d353b" font-family="'Courier New', 'Liberation Mono', monospace" font-size="21">merge</text>
  <text x="1161" y="107" text-anchor="middle" fill="#2d353b" font-family="'Noto Serif', Georgia, 'Times New Roman', serif" font-size="14" opacity="0.75">Integrate</text>

  <!-- Phase labels -->
  <text x="117" y="142" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="15" opacity="0.6">Setup</text>
  <line x1="57" y1="147" x2="177" y2="147" stroke="#859289" stroke-width="0.5" opacity="0.3"/>

  <text x="291" y="142" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="15" opacity="0.6">Setup</text>
  <line x1="231" y1="147" x2="351" y2="147" stroke="#859289" stroke-width="0.5" opacity="0.3"/>

  <text x="465" y="142" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="15" opacity="0.6">Planning</text>
  <line x1="405" y1="147" x2="525" y2="147" stroke="#859289" stroke-width="0.5" opacity="0.3"/>

  <text x="639" y="142" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="15" opacity="0.6">Planning</text>
  <line x1="579" y1="147" x2="699" y2="147" stroke="#859289" stroke-width="0.5" opacity="0.3"/>

  <text x="813" y="142" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="15" opacity="0.6">Execution</text>
  <line x1="753" y1="147" x2="873" y2="147" stroke="#859289" stroke-width="0.5" opacity="0.3"/>

  <text x="987" y="142" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="15" opacity="0.6">Execution</text>
  <line x1="927" y1="147" x2="1047" y2="147" stroke="#859289" stroke-width="0.5" opacity="0.3"/>

  <text x="1161" y="142" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="15" opacity="0.6">Execution</text>
  <line x1="1101" y1="147" x2="1221" y2="147" stroke="#859289" stroke-width="0.5" opacity="0.3"/>

  <!-- Loop arc: merge back to start-set ("repeat per set") -->
  <path d="M1161,120 L1161,200 Q1161,216 1141,216 L311,216 Q291,216 291,200 L291,120" stroke="#d3c6aa" stroke-width="1" opacity="0.3" fill="none"/>
  <polygon points="287,126 291,116 295,126" fill="#d3c6aa" opacity="0.3"/>
  <text x="726" y="238" text-anchor="middle" fill="#859289" font-family="'Noto Serif', Georgia, serif" font-size="14" opacity="0.5">repeat per set</text>
</svg>
