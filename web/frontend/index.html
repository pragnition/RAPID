<!doctype html>
<html lang="en" data-theme="everforest-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAPID Mission Control</title>
    <script>
      (function () {
        var theme = localStorage.getItem("rapid-theme") || "everforest";
        var mode = localStorage.getItem("rapid-mode") || "dark";
        document.documentElement.dataset.theme = theme + "-" + mode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
